repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock --check
        language: system
        entry: uv lock --check
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
